<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Not found — Parfait</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root{
  --page:#FFF9F2; --accent:#E0396B; --link:#5A6ACF; --ink:#43322B;
  --muted:rgba(67,50,43,.78);
}
@media (prefers-color-scheme: dark){
  :root{
    --page:#252017; --accent:#F0708F; --link:#98A4EE; --ink:#F2E9DE;
    --muted:rgba(242,233,222,.6);
  }
}
body{
  margin:0; background:var(--page); color:var(--ink); min-height:100vh;
  font:400 1.0625rem/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing:antialiased;
}
.parfait-bar{
  height:6px;
  background:linear-gradient(90deg,#FFF9F2 0 25%,#F2A93B 25% 50%,#E0396B 50% 75%,#5A6ACF 75% 100%);
}
main{max-width:560px; margin:0 auto; padding:96px 24px; text-align:center}
img{width:88px; height:88px; margin-bottom:18px}
h1{
  margin:0 0 14px; font-family:ui-serif, "New York", Georgia, serif;
  font-size:2.2rem; font-weight:600; letter-spacing:-.015em;
}
h1 span{color:var(--accent)}
p{color:var(--muted); margin:0 0 24px}
a{color:var(--link); text-underline-offset:3px}
a:focus-visible{outline:2px solid var(--link); outline-offset:2px; border-radius:4px}
</style>
</head>
<body>
<div class="parfait-bar" aria-hidden="true"></div>
<main>
  <img src="/icon.png" alt="Parfait app icon, a layered parfait glass">
  <h1>Nothing at <span>this layer</span>.</h1>
  <p>The page you're looking for isn't here.</p>
  <p><a href="/">Back to parfait.to</a> · <a href="https://github.com/conrad-vanl/parfait">GitHub</a></p>
</main>
</body>
</html>
